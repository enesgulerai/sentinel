apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-api
  template:
    metadata:
      labels:
        app: sentinel-api
    spec:
      containers:
        - name: api
          image: sentinel-api:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sentinel-config