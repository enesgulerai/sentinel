apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-deployment
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
          command:
            - redpanda
            - start
            - --mode=dev-container
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda-service:9092
          ports:
            - containerPort: 9092