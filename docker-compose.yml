version: '3.8'

services:
  # KAFKA (Redpanda)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sentinel-redpanda
    command:
      - redpanda
      - start
      - --mode dev-container
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sentinel_net

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: sentinel-console
    ports:
      - "8080:8080"
    entrypoint: /app/console
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - sentinel_net

  # REDIS
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
    - "6379:6379"
    networks:
      - sentinel_net

  # API
  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: sentinel-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDPANDA_BROKER=redpanda:9092
    depends_on:
      - redis
      - redpanda
    networks:
      - sentinel_net

  # UI
  ui:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: sentinel-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - sentinel_net

networks:
  sentinel_net:
    driver: bridge
