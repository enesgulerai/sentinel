services:
  # --- Service: Redpanda ---
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.2
    container_name: sentinel-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 512M
        limits:
          cpus: '1.0'
          memory: 1.5G

  # --- Service: Console ---
  console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: sentinel-console
    ports:
      - "8080:8080"
    entrypoint: /app/console
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M

  # --- Service: Redis ---
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          memory: 16M
        limits:
          memory: 64M

  # --- Service: API ---
  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: sentinel-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDPANDA_BROKER=redpanda:9092
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          cpus: '0.1'
          memory: 256M
        limits:
          cpus: '1.0'
          memory: 1G

  # --- Service: Consumer ---
  consumer:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: sentinel-consumer
    command: ["python", "-m", "src.inference.consumer"]
    environment:
      - REDPANDA_BROKER=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          cpus: '0.2'
          memory: 256M
        limits:
          cpus: '1.0'
          memory: 1G

  # --- Service: UI ---
  ui:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: sentinel-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_started
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 512M

  # --- Service: Prefect Server ---
  prefect-server:
    image: prefecthq/prefect:3-python3.11
    container_name: sentinel-prefect-server
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    ports:
      - "4200:4200"
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          cpus: "1.0"
          memory: 1G

  # --- Service: Orchestrator (Flow Runner) ---
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestration/Dockerfile
    container_name: sentinel-orchestrator
    restart: always
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server
    networks:
      - sentinel_net
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 512M

networks:
  sentinel_net:
    driver: bridge
